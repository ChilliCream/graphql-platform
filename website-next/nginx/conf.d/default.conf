server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    error_page 404 /404.html;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # redirects (managed in redirects.conf)
    include /etc/nginx/conf.d/redirects.conf;

    # Next.js hashed build assets — immutable forever
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # static asset extensions — long cache
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|gif|webp|avif|bmp|mp4|webm|ogg|mp3|wav|flac|aac|pdf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # Generated OG share-card images. The Next.js static export emits these as
    # extension-less files (out/docs-og/<id>/opengraph-image), so without this
    # block nginx would serve them as application/octet-stream (default_type)
    # and social scrapers (Slack/Facebook/LinkedIn) would refuse to render them.
    # Both og:image and twitter:image reference this single file. Force the PNG
    # content type and match the long-cache policy used for other static images.
    location ~ ^/docs-og/.+/opengraph-image$ {
        default_type image/png;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        try_files $uri =404;
    }

    # HTML — always revalidate
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri $uri.html $uri/index.html =404;
    }
}
