server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # TLS terminates upstream, so $scheme is http here. Emit relative Location
    # headers so redirects never downgrade the client to http://.
    absolute_redirect off;

    error_page 404 /404.html;

    # redirects (managed in redirects.conf)
    include /etc/nginx/conf.d/redirects.conf;

    # Next.js hashed build assets - immutable, cached forever
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Static asset files (CSS, JS, fonts, images, media) - immutable, cached forever
    location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|ico|svg|png|jpe?g|gif|webp|avif|bmp|mp4|webm|ogg|mp3|wav|flac|aac|pdf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Generated OG share-card images - immutable, cached forever
    location ~ ^/(.*/)?opengraph-image(-[^/]+)?$ {
        default_type image/png;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # HTML files - always revalidate
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Docs pages under a product: serve the page, but on a miss fall back to the
    # closest prerendered 404 (per-product, then docs-level, then global) so the
    # "read the docs" link is server-rendered with no layout shift. Must precede
    # the docs-level matcher; both are regex so they are tried in order.
    location ~ ^/docs/(?<product>[^/]+)/ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        error_page 404 @docs_product_404;
        try_files $uri $uri.html $uri/index.html =404;
    }

    location @docs_product_404 {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files /docs/$product/404.html /docs/404.html /404.html =404;
    }

    # Docs pages without a product segment (e.g. an unknown /docs/typo).
    location ~ ^/docs/ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        error_page 404 @docs_404;
        try_files $uri $uri.html $uri/index.html =404;
    }

    location @docs_404 {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files /docs/404.html /404.html =404;
    }

    # Blog pages fall back to the prerendered blog 404.
    location ~ ^/blog/ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        error_page 404 @blog_404;
        try_files $uri $uri.html $uri/index.html =404;
    }

    location @blog_404 {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files /blog/404.html /404.html =404;
    }

    # Catch-all for pages/routes not matched above - always revalidate
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri $uri.html $uri/index.html =404;
    }
}
