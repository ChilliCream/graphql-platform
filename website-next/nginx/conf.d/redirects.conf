# Redirects
#
# Add or update redirects here. This file is included by default.conf inside
# the main server block, so directives apply globally to the server.
#
# Conventions:
#   * use `rewrite ... permanent` for 301 redirects
#   * use `rewrite ... redirect`  for 302 redirects
#   * group related rules with a short comment

# permanent redirects (top-level)
rewrite ^/banana-cake-pop/?$ /products/nitro permanent;
rewrite ^/platform/bananacakepop/?$ /products/nitro permanent;
rewrite ^/company/?$ /resources permanent;
rewrite ^/products/?$ / permanent;
rewrite ^/support/?$ /services/support permanent;

# bcp -> nitro
rewrite ^/products/bananacakepop/?$ /products/nitro permanent;

# blog: /blog/YYYY/MM/DD/slug -> /blog/YYYY-MM-DD-slug
rewrite "^/blog/(\d{4})/(\d{2})/(\d{2})/(.+?)/?$" /blog/$1-$2-$3-$4 permanent;

# greendonut -> hotchocolate
rewrite ^/docs/greendonut.*$ /docs/hotchocolate/fetching-data/dataloader permanent;

# marshmallowpie -> hotchocolate
rewrite ^/docs/marshmallowpie.*$ /docs/hotchocolate permanent;

# apis/open-telemetry -> open-telemetry/operation-monitoring
rewrite ^/docs/bananacakepop/v2/apis/open-telemetry/?$ /docs/nitro/open-telemetry/operation-monitoring permanent;

# get-started -> get-started-with-graphql-in-net-core
rewrite ^/docs/hotchocolate/(v12|v13)/get-started/?$ /docs/hotchocolate/get-started-with-graphql-in-net-core permanent;

# performance/persisted-queries -> performance/persisted-operations
rewrite ^/docs/hotchocolate/(v13|v14)/performance/persisted-queries/?$ /docs/hotchocolate/performance/persisted-operations permanent;

# code-first|schema|schema-first -> defining-a-schema
rewrite ^/docs/hotchocolate/(v12|v13)/(code-first|schema|schema-first)/?$ /docs/hotchocolate/defining-a-schema permanent;

# schema/custom-scalar-types -> defining-a-schema/scalars
rewrite ^/docs/hotchocolate/(v12|v13)/schema/custom-scalar-types/?$ /docs/hotchocolate/defining-a-schema/scalars permanent;

# schema/descriptions -> defining-a-schema/documentation
rewrite ^/docs/hotchocolate/(v12|v13)/schema/descriptions/?$ /docs/hotchocolate/defining-a-schema/documentation permanent;

# schema/directives -> defining-a-schema/directives
rewrite ^/docs/hotchocolate/(v12|v13)/schema/directives/?$ /docs/hotchocolate/defining-a-schema/directives permanent;

# schema/enum-type -> defining-a-schema/enums
rewrite ^/docs/hotchocolate/(v12|v13)/schema/enum-type/?$ /docs/hotchocolate/defining-a-schema/enums permanent;

# schema/input-object-type -> defining-a-schema/input-object-types
rewrite ^/docs/hotchocolate/(v12|v13)/schema/input-object-type/?$ /docs/hotchocolate/defining-a-schema/input-object-types permanent;

# schema/interface-type -> defining-a-schema/interfaces
rewrite ^/docs/hotchocolate/(v12|v13)/schema/interface-type/?$ /docs/hotchocolate/defining-a-schema/interfaces permanent;

# schema/object-type -> defining-a-schema/object-types
rewrite ^/docs/hotchocolate/(v12|v13)/schema/object-type/?$ /docs/hotchocolate/defining-a-schema/object-types permanent;

# schema/relay -> defining-a-schema/relay
rewrite ^/docs/hotchocolate/(v12|v13)/schema/relay/?$ /docs/hotchocolate/defining-a-schema/relay permanent;

# schema/resolvers -> fetching-data/resolvers
rewrite ^/docs/hotchocolate/(v12|v13)/schema/resolvers/?$ /docs/hotchocolate/fetching-data/resolvers permanent;

# schema/union-type -> defining-a-schema/unions
rewrite ^/docs/hotchocolate/(v12|v13)/schema/union-type/?$ /docs/hotchocolate/defining-a-schema/unions permanent;

# data-fetching -> fetching-data/dataloader
rewrite ^/docs/hotchocolate/(v12|v13)/data-fetching/?$ /docs/hotchocolate/fetching-data/dataloader permanent;

# data-fetching/pagination -> fetching-data/pagination
rewrite ^/docs/hotchocolate/(v12|v13)/data-fetching/pagination/?$ /docs/hotchocolate/fetching-data/pagination permanent;

# data-fetching/filters -> fetching-data/filtering
rewrite ^/docs/hotchocolate/(v12|v13)/data-fetching/filters/?$ /docs/hotchocolate/fetching-data/filtering permanent;

# execution-engine -> performance/persisted-queries
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/?$ /docs/hotchocolate/performance/persisted-queries permanent;

# execution-engine/apollo-tracing -> server/instrumentation#apollo-tracing
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/apollo-tracing/?$ /docs/hotchocolate/server/instrumentation#apollo-tracing permanent;

# execution-engine/custom-context-data -> execution-engine
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/custom-context-data/?$ /docs/hotchocolate/execution-engine permanent;

# execution-engine/instrumentation -> server/instrumentation
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/instrumentation/?$ /docs/hotchocolate/server/instrumentation permanent;

# execution-engine/persisted-queries -> performance/persisted-queries
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/persisted-queries/?$ /docs/hotchocolate/performance/persisted-queries permanent;

# execution-engine/subscriptions -> defining-a-schema/subscriptions
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/subscriptions/?$ /docs/hotchocolate/defining-a-schema/subscriptions permanent;

# execution-engine/type-conversion -> defining-a-schema/scalars#custom-converters
rewrite ^/docs/hotchocolate/(v12|v13)/execution-engine/type-conversion/?$ /docs/hotchocolate/defining-a-schema/scalars#custom-converters permanent;

# security/security -> security
rewrite ^/docs/hotchocolate/(v12|v13)/security/security/?$ /docs/hotchocolate/security permanent;

# stitching -> distributed-schema
rewrite ^/docs/hotchocolate/(v12|v13)/stitching/?$ /docs/hotchocolate/distributed-schema permanent;

# tutorials -> integrations/entity-framework
rewrite ^/docs/hotchocolate/(v12|v13)/tutorials/?$ /docs/hotchocolate/integrations/entity-framework permanent;

# api-reference/aspnetcore -> server
rewrite ^/docs/hotchocolate/(v13)/api-reference/aspnetcore/?$ /docs/hotchocolate/server permanent;

# api-reference/migrate-from-* -> migrating/migrate-from-*
rewrite ^/docs/hotchocolate/(v13)/api-reference/(migrate-from-.*?)/?$ /docs/hotchocolate/migrating/$2 permanent;

# bcp -> nitro
rewrite ^/docs/bananacakepop(?:/v\d+)?/bcp-services/?$ /docs/nitro/nitro-services permanent;
rewrite ^/docs/bananacakepop(?:/v\d+)?(/.*[^/])?/?$ /docs/nitro$1 permanent;

# barista -> nitro
rewrite ^/docs/barista/v1/commands(/.*[^/])?/?$ /docs/nitro/cli-commands$1 permanent;
rewrite ^/docs/barista/v1(/.*[^/])?/?$ /docs/nitro/cli$1 permanent;

# error-filter -> errors
rewrite ^/docs/hotchocolate/(v13|v14)/api-reference/error-filter/?$ /docs/hotchocolate/api-reference/errors permanent;

# strip docs version: any remaining versioned docs URL redirects to the
# unversioned path (must run after the specific legacy rules above)
rewrite ^/docs/(hotchocolate|strawberryshake|fusion)/v\d+(/.*[^/])?/?$ /docs/$1$2 permanent;

# img/projects -> resources
rewrite ^/img/projects/greendonut-banner\.svg$ /resources/greendonut-banner.svg permanent;
rewrite ^/img/projects/greendonut-signet\.svg$ /resources/greendonut-icon.png permanent;
rewrite ^/img/projects/hotchocolate-banner\.svg$ /resources/hotchocolate-banner.svg permanent;
rewrite ^/img/projects/hotchocolate-signet\.svg$ /resources/hotchocolate-icon.png permanent;
rewrite ^/img/projects/react-rasta-banner\.svg$ /resources/react-rasta-banner.svg permanent;
rewrite ^/img/projects/react-rasta-signet\.svg$ /resources/react-rasta-signet.png permanent;
rewrite ^/img/projects/strawberryshake-banner\.svg$ /resources/strawberryshake-banner.svg permanent;
rewrite ^/img/projects/strawberryshake-signet\.svg$ /resources/strawberryshake-icon.png permanent;
rewrite ^/resources/greendonut-signet\.png$ /resources/greendonut-icon.png permanent;
rewrite ^/resources/hotchocolate-signet\.png$ /resources/hotchocolate-icon.png permanent;
rewrite ^/resources/nitro-signet\.png$ /resources/nitro-icon.png permanent;
rewrite ^/resources/strawberryshake-signet\.png$ /resources/strawberryshake-icon.png permanent;

# Strip trailing slashes for anything not matched above. The static export
# uses non-slash URLs (`trailingSlash: false`), so any path with a trailing
# slash 404s. This must run LAST: the specific rules above all tolerate an
# optional trailing slash themselves, so slashed legacy URLs reach their
# final target in a single hop instead of chaining through a slash-strip
# redirect first (the root `/` is left untouched).
rewrite ^/(.+)/$ /$1 permanent;
