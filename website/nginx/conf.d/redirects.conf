# distributed-schema -> fusion
rewrite ^/docs/hotchocolate/v\d+/distributed-schema(?:/.*)?$ /docs/fusion permanent;

# bcp -> nitro
rewrite ^/docs/bananacakepop(?:/v\d+)?/bcp-services/?$ /docs/nitro/nitro-services permanent;
rewrite ^/docs/bananacakepop(?:/v\d+)?(/.*[^/])?/?$ /docs/nitro$1 permanent;

# barista -> nitro
rewrite ^/docs/barista/v1/commands/?$ /docs/nitro/cli/installation permanent;
rewrite ^/docs/barista/v1/commands(/.*[^/])?/?$ /docs/nitro/cli$1 permanent;
rewrite ^/docs/barista/v1/?$ /docs/nitro/cli/installation permanent;
rewrite ^/docs/barista/v1(/.*[^/])?/?$ /docs/nitro/cli$1 permanent;

# strip docs version: any remaining versioned docs URL redirects to the
# unversioned path (must run after the specific legacy rules above)
rewrite ^/docs/(hotchocolate|strawberryshake|fusion|mocha)/v\d+(/.*[^/])?/?$ /docs/$1$2 permanent;

# img/projects -> resources
rewrite ^/img/projects/greendonut-banner\.svg$ /resources/greendonut-banner.svg permanent;
rewrite ^/img/projects/greendonut-signet\.svg$ /resources/greendonut-icon.png permanent;
rewrite ^/img/projects/hotchocolate-banner\.svg$ /resources/hotchocolate-banner.svg permanent;
rewrite ^/img/projects/hotchocolate-signet\.svg$ /resources/hotchocolate-icon.png permanent;
rewrite ^/img/projects/react-rasta-banner\.svg$ /resources/react-rasta-banner.svg permanent;
rewrite ^/img/projects/react-rasta-signet\.svg$ /resources/react-rasta-signet.png permanent;
rewrite ^/img/projects/strawberryshake-banner\.svg$ /resources/strawberryshake-banner.svg permanent;
rewrite ^/img/projects/strawberryshake-signet\.svg$ /resources/strawberryshake-icon.png permanent;
rewrite ^/resources/greendonut-signet\.png$ /resources/greendonut-icon.png permanent;
rewrite ^/resources/hotchocolate-signet\.png$ /resources/hotchocolate-icon.png permanent;
rewrite ^/resources/nitro-signet\.png$ /resources/nitro-icon.png permanent;
rewrite ^/resources/strawberryshake-signet\.png$ /resources/strawberryshake-icon.png permanent;

# Strip trailing slashes for anything not matched above. The static export
# uses non-slash URLs (`trailingSlash: false`), so any path with a trailing
# slash 404s. This must run LAST: the specific rules above all tolerate an
# optional trailing slash themselves, so slashed legacy URLs reach their
# final target in a single hop instead of chaining through a slash-strip
# redirect first (the root `/` is left untouched).
rewrite ^/(.+)/$ /$1 permanent;
