# fusion renames (old-structure names under any version prefix; v16 new-structure
# paths do not match these old names, so broadening the version is safe)
rewrite ^/docs/fusion/v\d+/aspire/?$ /docs/fusion/aspire-integration permanent;
rewrite ^/docs/fusion/v\d+/devops/?$ /docs/fusion/deployment-and-ci-cd permanent;
rewrite ^/docs/fusion/v\d+/(entities|lookups)/?$ /docs/fusion/entities-and-lookups permanent;
rewrite ^/docs/fusion/v\d+/node/?$ /docs/fusion/entities-and-lookups#graphql-global-object-identification permanent;
rewrite ^/docs/fusion/v\d+/quick-start/?$ /docs/fusion/getting-started permanent;

# fusion legacy reference page renames
rewrite ^/docs/fusion/(?:v\d+/)?nitro-cli-reference/?$ /docs/fusion/cli permanent;
rewrite ^/docs/fusion/(?:v\d+/)?attribute-and-directive-reference/?$ /docs/fusion/directives-reference permanent;

# /docs/graphql-fusion -> /docs/fusion
rewrite ^/docs/graphql-fusion(?:/.*)?$ /docs/fusion permanent;

# nitro cli-commands -> cli (section rename); fusion-configuration -> fusion
rewrite ^/docs/nitro/cli-commands/fusion-configuration/?$ /docs/nitro/cli/fusion permanent;
rewrite ^/docs/nitro/cli-commands(/.*[^/])?/?$ /docs/nitro/cli$1 permanent;

# nitro cli/authentication -> cli/global-options (removed page)
rewrite ^/docs/nitro/cli/authentication/?$ /docs/nitro/cli/global-options permanent;

# strawberryshake performance/persisted-queries -> performance/persisted-operations
