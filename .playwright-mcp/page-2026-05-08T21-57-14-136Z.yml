                - heading "Federate" [level=3] [ref=e107]
                - paragraph [ref=e108]: Compose hundreds of services into one GraphQL mesh. Polyglot, build-time, no .NET required at the edges.
              - article [ref=e109]:
                - img [ref=e111]
                - heading "Operate" [level=3] [ref=e116]
                - paragraph [ref=e117]: Nitro on your infra. Tracing, schema registry, RBAC, and audit log — air-gapped if you need it.
