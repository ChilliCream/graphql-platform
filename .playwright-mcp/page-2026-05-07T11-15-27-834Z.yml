            - generic [ref=e134]:
              - generic [ref=e135]: Instructions
              - generic [ref=e136]:
                - paragraph [ref=e137]: Once you set up the integration, logs from your Vercel functions will begin to stream your logs into Datadog. Our Vercel dashboard provides summary metrics, and an access point to drill down into your logs.
                - paragraph [ref=e138]: You will be able to manage, analyze and archive your Vercel logs alongside logs from across your infrastructure. Datadog's logs overview visualizes key log data including total requests over time — a useful heuristic for traffic volume within your Vercel Functions–powered backend — along with 4xx and 5xx error log counts. This provides a high-level overview of the performance of your functions. You can also define additional custom metrics based on your logs for easier monitoring and alerting, and longer retention.
                - paragraph [ref=e139]: Datadog APM enables you to visualize and understand the performance of your Vercel functions in depth. Get code-level insights and conduct targeted root cause analysis to understand how your functions are interacting with downstream services.
