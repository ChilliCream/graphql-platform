name: Publish Website

# When to trigger the workflow
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-website.yml
      - .docker/website/**
      - website/**

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.CONTAINER_REG_URL }}
          username: ${{ secrets.CONTAINER_REG_USERNAME }}
          password: ${{ secrets.CONTAINER_REG_PASSWORD }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: "website/yarn.lock"

      - name: Cache Next.js Build Artifacts
        uses: actions/cache@v5
        with:
          path: |
            website/.next/cache
            website/public/optimized
          key: ${{ runner.os }}-nextjs-${{ hashFiles('website/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('website/yarn.lock') }}-

      - name: Install Packages
        run: yarn --immutable --network-timeout 100000
        working-directory: website

      - name: Delete Free Icons
        run: |
          rm -rf src/images/icons
        working-directory: website

      - name: Unzip Pro Icons
        run: |
          sudo apt-get install -y unzip
          unzip -P ${{ secrets.ICON_PASSWORD }} src/images/icons.zip -d src/images/
        working-directory: website

      - name: Optimize Images
        run: yarn optimize-images
        working-directory: website

      - name: Build Website
        run: yarn build
        working-directory: website

      - name: Build WebSite Container
        uses: docker/build-push-action@v7
        with:
          context: ./website
          file: .docker/website/dockerfile
          push: true
          tags: ${{ secrets.CONTAINER_REG_DOMAIN }}/ccc-website-${{ github.ref_name }}:${{ github.run_id }}

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ccc-p-us1-website
          slot-name: "next"
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.CONTAINER_REG_DOMAIN }}/ccc-website-${{ github.ref_name }}:${{ github.run_id }}

      # No purge step. HTML and RSC payloads are served with
      # cf-cache-status: DYNAMIC (not edge-cached), and every asset under
      # /_next/static is content-hashed + immutable, so new builds create
      # new URLs. A purge_everything here would only invalidate the
      # immutable chunks and stampede the origin right as the container is
      # being swapped — the exact race that caused the 2026-04-23 outage.
