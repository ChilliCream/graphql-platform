name: Publish Website

# When to trigger the workflow
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-website.yml
      - website/**
      - src/Mocha/src/mocha-visualizer/**

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false
          # Full history so doc pages get accurate last-updated dates.
          fetch-depth: 0
          sparse-checkout: |
            website
            src/Mocha/src/mocha-visualizer

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: "website/yarn.lock"

      - name: Cache Next.js Build Artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            website/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('website/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('website/yarn.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Install Packages
        run: yarn --immutable --network-timeout 100000
        working-directory: website
        env:
          CHILLICREAM_FRONTEND_ENV: ci

      - name: Install Playwright Chromium
        run: yarn playwright install --with-deps chromium
        working-directory: website

      - name: Cache Optimized Images
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            website/public/_optimized
          key: ${{ runner.os }}-optimized-images-${{ hashFiles('website/public/images/**', 'website/src/image-optimization/**', 'website/scripts/optimize-images.mjs') }}
          restore-keys: |
            ${{ runner.os }}-optimized-images-

      - name: Optimize Images
        run: yarn optimize-images
        working-directory: website

      - name: Generate Git Metadata
        run: yarn generate-git-metadata
        working-directory: website

      - name: Build Website
        run: yarn build
        working-directory: website
        env:
          NEXT_PUBLIC_SITE_URL: "https://chillicream.com"
          NEXT_PUBLIC_ALGOLIA_APP_ID: ${{ vars.NEXT_PUBLIC_ALGOLIA_APP_ID }}
          NEXT_PUBLIC_ALGOLIA_API_KEY: ${{ secrets.NEXT_PUBLIC_ALGOLIA_API_KEY }}
          NEXT_PUBLIC_ALGOLIA_INDEX: ${{ vars.NEXT_PUBLIC_ALGOLIA_INDEX }}
          NEXT_PUBLIC_COOKIEBOT_CBID: ${{ secrets.NEXT_PUBLIC_COOKIEBOT_CBID }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ secrets.CONTAINER_REG_URL }}
          username: ${{ secrets.CONTAINER_REG_USERNAME }}
          password: ${{ secrets.CONTAINER_REG_PASSWORD }}

      - name: Build Website Container
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./website
          file: ./website/Dockerfile
          push: true
          tags: ${{ secrets.CONTAINER_REG_DOMAIN }}/ccc-website-${{ github.ref_name }}:${{ github.run_id }}
          cache-from: type=gha,scope=website
          cache-to: type=gha,scope=website,mode=max

      - name: Deploy to Azure WebApp
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ccc-p-us1-website
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.CONTAINER_REG_DOMAIN }}/ccc-website-${{ github.ref_name }}:${{ github.run_id }}

      - name: Purge CDN Cache
        run: |
          curl --request POST \
            --url https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache \
            --header 'Content-Type: application/json' \
            --header 'Authorization: Bearer ${{ secrets.CLOUDFLARE_AUTH_TOKEN }}' \
            --data '{ "purge_everything": true }'
