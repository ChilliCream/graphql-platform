name: Benchmarks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
      - main-version-*
  push:
    branches:
      - main

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: "${{ matrix.test-name }} ${{ matrix.mode-label }} (${{ matrix.runner-label }})"
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on:
      group: ${{ matrix.runner-group }}
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        test: [no-recursion, deep-recursion, variable-batch]
        mode: [constant, ramping]
        runner-group: [Benchmarking, Benchmarking-2]
        include:
          - runner-group: Benchmarking
            runner-label: "Runner 1"
          - runner-group: Benchmarking-2
            runner-label: "Runner 2"
          - test: no-recursion
            test-name: "Simple Composite Query"
          - test: deep-recursion
            test-name: "Deep Recursion"
          - test: variable-batch
            test-name: "Variable Batch"
          - mode: constant
            mode-label: "Constant"
          - mode: ramping
            mode-label: "Ramping"

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          show-progress: false

      - name: Install .NET
        run: |
          if ! command -v dotnet &> /dev/null; then
            echo "Installing .NET..."
            curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
            chmod +x dotnet-install.sh
            ./dotnet-install.sh --channel 10.0 --install-dir $HOME/.dotnet
            rm dotnet-install.sh
            echo "$HOME/.dotnet" >> $GITHUB_PATH
            export PATH="$HOME/.dotnet:$PATH"
          fi
          dotnet --version

      - name: Install k6
        run: |
          if ! command -v k6 &> /dev/null; then
            echo "Installing k6..."
            sudo gpg -k
            sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
            echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
            sudo apt-get update
            sudo apt-get install k6 -y
          fi
          k6 version

      - name: Install jq for result parsing
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get install jq -y
          fi

      - name: Make scripts executable
        working-directory: src/HotChocolate/Fusion-vnext/benchmarks/k6
        run: chmod +x *.sh

      - name: Run benchmark
        working-directory: src/HotChocolate/Fusion-vnext/benchmarks/k6
        run: |
          ./run-single-benchmark.sh \
            "${{ matrix.test }}" \
            "${{ matrix.mode }}" \
            "result.json" \
            "${{ matrix.runner-group }}" \
            "${{ matrix.runner-label }}"

      - name: Upload benchmark result
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: benchmark-${{ matrix.test }}-${{ matrix.mode }}-${{ matrix.runner-group }}
          path: src/HotChocolate/Fusion-vnext/benchmarks/k6/result.json
          retention-days: 30

      - name: Download all available benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: benchmark-*
          path: benchmark-results

      - name: Generate performance report
        if: github.event_name == 'pull_request'
        working-directory: src/HotChocolate/Fusion-vnext/benchmarks/k6
        run: |
          ./generate-report.sh "$GITHUB_WORKSPACE/benchmark-results" performance-report.md

      - name: Update PR comment with performance report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'src/HotChocolate/Fusion-vnext/benchmarks/k6/performance-report.md';

            let report;
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch (error) {
              console.error('Failed to read performance report:', error);
              return;
            }

            // Count how many benchmarks we have completed data for
            const pendingCount = (report.match(/\*pending\*/g) || []).length;
            const ourCompleted = 12 * 2 - pendingCount; // 12 benchmarks x 2 tables (summary + detail) minus pending cells

            const marker = '<!-- fusion-gateway-benchmark-report -->';
            const progressMarker = (n) => `<!-- completed:${n} -->`;
            const timestamp = new Date().toUTCString();
            const commitSha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const commentBody = `${marker}\n${progressMarker(ourCompleted)}\n${report}\n\n---\n*Run [${context.runId}](${runUrl}) • Commit ${commitSha} • ${timestamp}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              // Optimistic concurrency: only update if we have more data
              const existingMatch = existing.body.match(/<!-- completed:(\d+) -->/);
              const existingCompleted = existingMatch ? parseInt(existingMatch[1], 10) : 0;

              if (ourCompleted >= existingCompleted) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: commentBody,
                });
                console.log(`Updated comment (${ourCompleted} >= ${existingCompleted} completed)`);
              } else {
                console.log(`Skipped update (${ourCompleted} < ${existingCompleted} completed)`);
              }
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

  report:
    name: "Final Performance Report"
    needs: benchmark
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: src/HotChocolate/Fusion-vnext/benchmarks/k6
          show-progress: false

      - name: Install jq
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install jq -y
          fi

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: benchmark-*
          path: benchmark-results

      - name: Generate final performance report
        working-directory: src/HotChocolate/Fusion-vnext/benchmarks/k6
        run: |
          chmod +x generate-report.sh
          ./generate-report.sh "$GITHUB_WORKSPACE/benchmark-results" performance-report.md

      - name: Update PR comment with final report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'src/HotChocolate/Fusion-vnext/benchmarks/k6/performance-report.md';

            let report;
            try {
              report = fs.readFileSync(reportPath, 'utf8');
            } catch (error) {
              console.error('Failed to read performance report:', error);
              return;
            }

            const marker = '<!-- fusion-gateway-benchmark-report -->';
            const timestamp = new Date().toUTCString();
            const commitSha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Final report always wins — use max completed marker
            const commentBody = `${marker}\n<!-- completed:999 -->\n${report}\n\n---\n*Run [${context.runId}](${runUrl}) • Commit ${commitSha} • ${timestamp}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

  store-results:
    name: "Store Baseline Results"
    needs: benchmark
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: benchmark-results

      - name: Checkout performance data repository
        uses: actions/checkout@v6
        with:
          repository: ChilliCream/graphql-platform-performance-data
          token: ${{ secrets.PERFORMANCE_DATA_TOKEN }}
          path: performance-data-repo
          fetch-depth: 1
          show-progress: false

      - name: Store results to external repository
        run: |
          mkdir -p performance-data-repo/fusion-gateway

          for dir in benchmark-results/benchmark-*/; do
            if [ -f "$dir/result.json" ]; then
              name=$(basename "$dir")
              key=${name#benchmark-}
              cp "$dir/result.json" "performance-data-repo/fusion-gateway/${key}.json"
            fi
          done

          cd performance-data-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add fusion-gateway/

          if ! git diff --staged --quiet; then
            git commit -m "Update Fusion Gateway benchmark data from ${{ github.sha }}"
            git push
          else
            echo "No changes to performance data"
          fi
