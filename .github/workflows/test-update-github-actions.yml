name: 🧪 Test Update GitHub Actions

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  update-github-actions-test:
    name: 🔄 Test update (${{ matrix.repo }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - nitro-fusion-upload

    env:
      VERSION: 16.0.0-rc.1.15

    steps:
      - name: 🔐 Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ACTIONS_APP_ID }}
          private-key: ${{ secrets.ACTIONS_APP_PRIVATE_KEY }}
          owner: ChilliCream
          repositories: ${{ matrix.repo }}

      - name: 🚀 Trigger action repository update workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api --method POST \
            "/repos/ChilliCream/${{ matrix.repo }}/dispatches" \
            -f event_type=update-from-platform \
            -f client_payload[version]="$VERSION"
