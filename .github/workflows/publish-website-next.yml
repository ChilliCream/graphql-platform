name: Publish Website (Next)

# When to trigger the workflow
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-website-next.yml
      - website-next/**

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          show-progress: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "yarn"
          cache-dependency-path: "website-next/yarn.lock"

      - name: Cache Next.js Build Artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            website-next/.next/cache
          key: ${{ runner.os }}-nextjs-next-${{ hashFiles('website-next/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-next-${{ hashFiles('website-next/yarn.lock') }}-

      - name: Install Packages
        run: yarn --immutable --network-timeout 100000
        working-directory: website-next

      - name: Build Website
        run: yarn build
        working-directory: website-next

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3

      - name: Build Website Container
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./website-next
          file: ./website-next/Dockerfile
          push: false
          tags: ccc-website-next-${{ github.ref_name }}:${{ github.run_id }}
          cache-from: type=gha,scope=website-next
          cache-to: type=gha,scope=website-next,mode=max
