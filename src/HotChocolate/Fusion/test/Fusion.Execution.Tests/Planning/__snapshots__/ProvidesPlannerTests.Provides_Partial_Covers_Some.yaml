operation:
  - document: |
      {
        products {
          reviews {
            author {
              username
              email
              id @fusion__requirement
            }
          }
          upc @fusion__requirement
        }
      }
    hash: 123456789101112
    searchSpace: 1
    expandedNodes: 3
nodes:
  - id: 1
    type: Operation
    schema: products
    operation: |
      query Op_123456789101112_1 {
        products {
          upc
        }
      }
  - id: 2
    type: Operation
    schema: reviews
    operation: |
      query Op_123456789101112_2($__fusion_1_upc: String!) {
        productByUpc(upc: $__fusion_1_upc) {
          reviews {
            author {
              username
              id
            }
          }
        }
      }
    source: $.productByUpc
    target: $.products
    requirements:
      - name: __fusion_1_upc
        selectionMap: >-
          upc
    dependencies:
      - id: 1
  - id: 3
    type: Operation
    schema: users
    operation: |
      query Op_123456789101112_3($__fusion_2_id: ID!) {
        userById(id: $__fusion_2_id) {
          email
        }
      }
    source: $.userById
    target: $.products.reviews.author
    requirements:
      - name: __fusion_2_id
        selectionMap: >-
          id
    dependencies:
      - id: 2
