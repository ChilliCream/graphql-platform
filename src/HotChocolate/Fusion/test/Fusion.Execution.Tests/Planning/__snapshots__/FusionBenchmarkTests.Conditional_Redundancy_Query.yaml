          id @fusion__requirement
          name
          description
          price
          averageRating
          dimension {
            height
            width
          }
          reviews(first: 5) {
            pageInfo {
              hasNextPage
              hasPreviousPage
              ... @include(if: $includeMetadata) {
                startCursor
                endCursor
              }
            }
            edges {
              cursor
              node {
                id
                body
                stars
                author @include(if: $includeReviews) {
                  id
                  id @fusion__requirement
                  displayName
                }
              }
            }
          }
        }
        products(first: 3) {
          edges {
            node {
              id
              id @fusion__requirement
              name
              description
              price
              averageRating
              dimension @include(if: $includeExpensive) {
                height
                width
              }
              reviews(first: 3) @include(if: $includeReviews) {
                nodes {
                  id
                  body
                  stars
                }
              }
            }
          }
        }
        searchContent(query: "redundant") {
          __typename @fusion__requirement
          id
          title
          description
          ... on Product {
            id
            id @fusion__requirement
            name
            price
            averageRating
            dimension @include(if: $includeExpensive) {
              height
              width
            }
            reviews(first: 2) @include(if: $includeReviews) {
              nodes {
                id
                body
                stars
              }
            }
          }
          ... on Article {
            id
            title
            description
            content
            publishedAt
            tags @include(if: $includeExpensive)
            author @include(if: $includeDetails) {
              id
              id @fusion__requirement
              displayName
            }
          }
        }
        viewer {
          displayName
          reviews(first: 5) @include(if: $includeReviews) {
            pageInfo {
              hasNextPage
              hasPreviousPage
              ... @include(if: $includeMetadata) {
                startCursor
                endCursor
              }
            }
            edges {
              cursor
              node {
                id
                body
                stars
                author @include(if: $includeDetails) {
                  id
                  id @fusion__requirement
                  displayName
                  reviews(first: 2) {
                    nodes {
                      id
                      id @fusion__requirement
                      body
                      stars
                    }
                  }
                }
              }
            }
          }
        }
      }
