schema {
  query: Query
}

type Query {
  product(id: Int!): Product
  productById(id: Int!): Product @internal @lookup
  topProducts: [Product!]!
  userByEmail(email: String!): User @internal @lookup
}

type Product @key(fields: "id") {
  id: Int!
  name: String!
  price: Float!
}

type User @key(fields: "email") {
  email: String!
  name: String!
}
