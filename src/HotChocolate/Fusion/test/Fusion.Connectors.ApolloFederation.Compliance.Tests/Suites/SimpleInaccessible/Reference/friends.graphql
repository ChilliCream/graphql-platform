extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3"
    import: ["@key", "@inaccessible", "@shareable"]
  )

type Query {
  usersInFriends: [User!]!
}

type User @key(fields: "id") {
  id: ID
  friends(type: FriendType = FAMILY @inaccessible): [User!]!
  type: FriendType
}

enum FriendType {
  FAMILY @inaccessible
  FRIEND
}
