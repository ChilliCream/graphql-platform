extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.3"
    import: ["@key", "@external", "@shareable"]
  )

type Query {
  products: [Product!]!
}

type Product @key(fields: "id") @key(fields: "id pid") {
  id: ID!
  pid: ID!
  category: Category @shareable
}

type Category @key(fields: "id") {
  id: ID!
  name: String! @shareable
}
