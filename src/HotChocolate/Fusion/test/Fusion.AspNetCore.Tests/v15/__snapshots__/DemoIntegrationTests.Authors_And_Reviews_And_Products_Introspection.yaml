sourceSchemas:
  - name: A
    schema: |
      schema {
        query: Query
      }

      interface Node {
        id: ID!
      }

      type Query {
        node(id: ID!): Node @lookup @shareable
        nodes(ids: [ID!]!): [Node]! @shareable
        userById(id: ID!): User!
        users: [User!]!
        testWithTwoArgumentsDifferingNullability(first: Int!, second: Int): String!
      }

      type User implements Node {
        id: ID!
        name: String!
        username: String!
        birthdate: String!
      }
  - name: B
    schema: |
      schema {
        query: Query
      }

      interface Node {
        id: ID!
      }

      type Product implements Node {
        id: ID!
        reviews: [Review!]!
        reviewCount: Int!
      }

      type Query {
        node(id: ID!): Node @lookup @shareable
        nodes(ids: [ID!]!): [Node]! @shareable
        reviews: [Review!]!
      }

      type Review implements Node {
        id: ID!
        body: String!
        author: User!
        product: Product!
      }

      type User implements Node {
        id: ID!
        reviews: [Review!]!
        errorField: String @error
      }
  - name: C
    schema: |
      schema {
        query: Query
      }

      interface Node {
        id: ID!
      }

      type Product implements Node {
        id: ID!
        name: String!
        size: Int! @shareable
        weight: Int! @shareable
        repeat(num: Int!): String!
        repeatData(data: RepeatDataInput!): RepeatDataPayload!
      }

      type Query {
        node(id: ID!): Node @lookup @shareable
        nodes(ids: [ID!]!): [Node]! @shareable
        productById(id: ID!): Product @lookup @shareable
        topProducts(first: Int!): [Product!]!
      }

      type RepeatDataData {
        num: Int!
      }

      type RepeatDataPayload {
        data: RepeatDataData!
      }

      input RepeatDataDataInput {
        num: Int!
      }

      input RepeatDataInput {
        data: RepeatDataDataInput!
      }
