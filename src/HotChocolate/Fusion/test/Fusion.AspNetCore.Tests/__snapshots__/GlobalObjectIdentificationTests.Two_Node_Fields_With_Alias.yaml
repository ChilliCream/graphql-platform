title: Two_Node_Fields_With_Alias
request:
  document: |
    {
      a: node(id: "RGlzY3Vzc2lvbjox") {
        ... on Discussion {
          title
        }
      }
      b: node(id: "RGlzY3Vzc2lvbjoy") {
        ... on Discussion {
          title
          commentCount
        }
      }
    }
response:
  body: |
    {
      "errors": [
        {
          "message": "Unexpected Execution Error"
        }
      ]
    }
sourceSchemas:
  - name: A
    schema: |
      schema {
        query: Query
      }

      interface Node {
        id: ID!
      }

      type Discussion implements Node {
        id: ID!
        title: String!
      }

      type Query {
        node(id: ID!): Node @lookup @shareable
        discussionById(discussionId: ID! @is(field: "id")): Discussion @lookup
      }
  - name: B
    schema: |
      schema {
        query: Query
      }

      interface Node {
        id: ID!
      }

      type Discussion implements Node {
        id: ID!
        commentCount: Int!
      }

      type Query {
        node(id: ID!): Node @lookup @shareable
        discussion(id: ID!): Discussion @lookup
      }
