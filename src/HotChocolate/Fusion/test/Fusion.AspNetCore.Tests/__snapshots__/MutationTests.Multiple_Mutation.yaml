title: Multiple_Mutation
request:
  document: |
    mutation {
      a: createBook(input: { title: "Book1" }) {
        book {
          id
          author
        }
      }
      b: createBook(input: { title: "Book2" }) {
        book {
          id
          title
          author
        }
      }
    }
response:
  body: |
    {
      "errors": [
        {
          "message": "The request exceeded the configured timeout of \u006000:00:30\u0060.",
          "extensions": {
            "code": "HC0045"
          }
        }
      ]
    }
sourceSchemas:
  - name: A
    schema: |
      schema {
        query: Query
        mutation: Mutation
      }

      type Book @key(fields: "id") {
        id: Int!
        title: String!
      }

      type CreateBookPayload {
        book: Book!
      }

      type Mutation {
        createBook(input: CreateBookInput!): CreateBookPayload!
      }

      type Query {
        foo: String!
      }

      input CreateBookInput {
        title: String!
      }
    interactions:
      - request:
          document: |
            mutation Op_192dc5f8_1 {
              a: createBook(input: { title: "Book1" }) {
                book {
                  id
                }
              }
            }
        response:
          results:
            - |
              {
                "data": {
                  "a": {
                    "book": {
                      "id": 1
                    }
                  }
                }
              }
  - name: B
    schema: |
      schema {
        query: Query
      }

      type Book {
        id: Int!
        author: String!
      }

      type Query {
        bookById(id: Int!): Book! @internal @lookup
      }
