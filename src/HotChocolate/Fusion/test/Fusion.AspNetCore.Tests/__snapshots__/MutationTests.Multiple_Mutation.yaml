title: Multiple_Mutation
request:
  document: |
    mutation {
      a: createBook(input: { title: "Book1" }) {
        book {
          id
          author
        }
      }
      b: createBook(input: { title: "Book2" }) {
        book {
          id
          title
          author
        }
      }
    }
response:
  body: |
    {
      "data": {
        "a": {
          "book": {
            "id": 1,
            "author": "Abc"
          }
        },
        "b": {
          "book": {
            "id": 2,
            "title": "Book2",
            "author": "Abc"
          }
        }
      }
    }
sourceSchemas:
  - name: A
    schema: |
      schema {
        query: Query
        mutation: Mutation
      }

      type Query {
        foo: String!
      }

      type Mutation {
        createBook(input: CreateBookInput!): CreateBookPayload!
      }

      type Book @key(fields: "id") {
        id: Int!
        title: String!
      }

      type CreateBookPayload {
        book: Book!
      }

      input CreateBookInput {
        title: String!
      }
    interactions:
      - request:
          accept: application/graphql-response+json; charset=utf-8, application/json; charset=utf-8, application/jsonl; charset=utf-8, text/event-stream; charset=utf-8
          document: |
            mutation Op_192dc5f8_1 {
              a: createBook(input: { title: "Book1" }) {
                book {
                  id
                }
              }
            }
        response:
          results:
            - |
              {
                "data": {
                  "a": {
                    "book": {
                      "id": 1
                    }
                  }
                }
              }
      - request:
          accept: application/graphql-response+json; charset=utf-8, application/json; charset=utf-8, application/jsonl; charset=utf-8, text/event-stream; charset=utf-8
          document: |
            mutation Op_192dc5f8_3 {
              b: createBook(input: { title: "Book2" }) {
                book {
                  id
                  title
                }
              }
            }
        response:
          results:
            - |
              {
                "data": {
                  "b": {
                    "book": {
                      "id": 2,
                      "title": "Book2"
                    }
                  }
                }
              }
  - name: B
    schema: |
      schema {
        query: Query
      }

      type Query {
        bookById(id: Int!): Book @internal @lookup
      }

      type Book {
        id: Int!
        author: String!
      }
    interactions:
      - request:
          accept: application/jsonl; charset=utf-8, text/event-stream; charset=utf-8, application/graphql-response+json; charset=utf-8, application/json; charset=utf-8
          document: |
            query Op_192dc5f8_2($__fusion_1_id: Int!) {
              bookById(id: $__fusion_1_id) {
                author
              }
            }
          variables: |
            [
              {
                "__fusion_1_id": 1
              },
              {
                "__fusion_1_id": 2
              }
            ]
        response:
          contentType: application/jsonl; charset=utf-8
          results:
            - |
              {
                "data": {
                  "bookById": {
                    "author": "Abc"
                  }
                }
              }
            - |
              {
                "data": {
                  "bookById": {
                    "author": "Abc"
                  }
                }
              }
