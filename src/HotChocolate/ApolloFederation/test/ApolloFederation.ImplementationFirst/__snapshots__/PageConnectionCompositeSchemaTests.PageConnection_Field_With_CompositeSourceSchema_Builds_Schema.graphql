schema {
  query: Query
}

type Query {
  employeeByPageTest(
    "Returns the first _n_ elements from the list."
    first: Int
    "Returns the elements in the list that come after the specified cursor."
    after: String
    "Returns the last _n_ elements from the list."
    last: Int
    "Returns the elements in the list that come before the specified cursor."
    before: String
  ): EmployeeConnection!
}

type Employee {
  empId: Int!
  name: String!
}

"A connection to a list of items."
type EmployeeConnection @shareable {
  "A list of edges."
  edges: [EmployeeEdge!]
  "A flattened list of the nodes"
  nodes: [Employee!]
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "Identifies the total count of items in the connection."
  totalCount: Int!
}

type EmployeeEdge @shareable {
  "The item at the end of the edge."
  node: Employee!
  "A cursor for use in pagination."
  cursor: String!
}

"A cursor that points to a specific page."
type PageCursor @shareable {
  "The page number."
  page: Int!
  "The cursor."
  cursor: String!
}

"Information about pagination in a connection."
type PageInfo @shareable {
  "Indicates whether more edges exist following the set defined by the clients arguments."
  hasNextPage: Boolean!
  "Indicates whether more edges exist prior the set defined by the clients arguments."
  hasPreviousPage: Boolean!
  "When paginating backwards, the cursor to continue."
  startCursor: String
  "When paginating forwards, the cursor to continue."
  endCursor: String
  "A list of cursors to continue paginating forwards."
  forwardCursors: [PageCursor!]!
  "A list of cursors to continue paginating backwards."
  backwardCursors: [PageCursor!]!
}

"""
By default, only a single source schema is allowed to contribute
a particular field to an object type.

            
This prevents source schemas from inadvertently defining similarly named
fields that are not semantically equivalent.

            
Fields must be explicitly marked as @shareable to allow multiple source
schemas to define them, ensuring that the decision to serve a field from
more than one source schema is intentional and coordinated.


directive @shareable repeatable on OBJECT | FIELD_DEFINITION
"""
directive @shareable repeatable on OBJECT | FIELD_DEFINITION
