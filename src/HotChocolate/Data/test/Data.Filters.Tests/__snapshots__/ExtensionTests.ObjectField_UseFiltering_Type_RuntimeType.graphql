schema {
  query: Query
}

type Query {
  foos(where: BarFilterInput): [Foo!]!
}

type Foo {
  bar: String!
}

input BarFilterInput {
  and: [BarFilterInput!]
  or: [BarFilterInput!]
  foo: StringOperationFilterInput
}

input StringOperationFilterInput {
  and: [StringOperationFilterInput!]
  or: [StringOperationFilterInput!]
  eq: String
  neq: String
  contains: String
  ncontains: String
  in: [String]
  nin: [String]
  startsWith: String
  nstartsWith: String
  endsWith: String
  nendsWith: String
}
