schema {
  query: Query4
}

type Query4 {
  bars(where: ItWorks): [Bar!]!
}

type Bar {
  baz: Long!
  shouldNotBeVisible: Int
}

input ItWorks {
  and: [ItWorks!]
  or: [ItWorks!]
  baz: LongOperationFilterInput
}

input LongOperationFilterInput {
  eq: Long
  neq: Long
  in: [Long]
  nin: [Long]
  gt: Long
  ngt: Long
  gte: Long
  ngte: Long
  lt: Long
  nlt: Long
  lte: Long
  nlte: Long
}

"The `Long` scalar type represents a signed 64-bit integer."
scalar Long
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/long.html")
