schema {
  query: Query
}

type Query {
  foo(where: BarFilterInput): Bar
}

type Bar {
  baz: String!
  qux: String!
}

input BarFilterInput {
  and: [BarFilterInput!]
  or: [BarFilterInput!]
  qux: StringOperationFilterInput
}

input StringOperationFilterInput {
  and: [StringOperationFilterInput!]
  or: [StringOperationFilterInput!]
  eq: String
  neq: String
  contains: String
  ncontains: String
  in: [String]
  nin: [String]
  startsWith: String
  nstartsWith: String
  endsWith: String
  nendsWith: String
}
