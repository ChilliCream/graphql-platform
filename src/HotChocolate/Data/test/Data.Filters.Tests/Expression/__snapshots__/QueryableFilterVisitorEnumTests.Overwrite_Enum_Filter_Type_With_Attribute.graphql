schema {
  query: Query
}

type Query {
  foo: String
}

input EntityWithTypeAttributeFilterInput {
  and: [EntityWithTypeAttributeFilterInput!]
  or: [EntityWithTypeAttributeFilterInput!]
  barEnum: ShortOperationFilterInput
}

input ShortOperationFilterInput {
  eq: Short
  neq: Short
  in: [Short]
  nin: [Short]
  gt: Short
  ngt: Short
  gte: Short
  ngte: Short
  lt: Short
  nlt: Short
  lte: Short
  nlte: Short
}

"The `Short` scalar type represents a signed 16-bit integer."
scalar Short
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/short.html")
