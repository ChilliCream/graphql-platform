schema {
  query: Query
}

type Query {
  foo(test: BarFilterInput): String
}

input BarFilterInput {
  and: [BarFilterInput!]
  or: [BarFilterInput!]
  foo: FooFilterInput
  fooNullable: FooFilterInput
}

input FooFilterInput {
  and: [FooFilterInput!]
  or: [FooFilterInput!]
  barShort: ShortOperationFilterInput
}

input ShortOperationFilterInput {
  eq: Short
  neq: Short
  in: [Short]
  nin: [Short]
  gt: Short
  ngt: Short
  gte: Short
  ngte: Short
  lt: Short
  nlt: Short
  lte: Short
  nlte: Short
}

"The `Short` scalar type represents a signed 16-bit integer."
scalar Short
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/short.html")
