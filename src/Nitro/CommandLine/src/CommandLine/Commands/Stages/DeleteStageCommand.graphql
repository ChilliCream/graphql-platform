mutation ForceDeleteStageByIdCommandMutation($input: ForceDeleteStageByIdInput!) {
  forceDeleteStageById(input: $input) {
    api {
      stages {
        ...StageDetailPrompt_Stage
      }
    }
    errors {
      ...Error
      ...ApiNotFoundError
      ...StageNotFoundError
      ...UnauthorizedOperation
    }
  }
}
