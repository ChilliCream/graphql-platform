mutation ForceDeleteStageByApiIdCommandMutation($input: ForceDeleteStageByApiIdInput!) {
  forceDeleteStageByApiId(input: $input) {
    api {
      stages {
        ...StageDetailPrompt_Stage
      }
    }
    errors {
      ...Error
      ...ApiNotFoundError
      ...StageNotFoundError
      ...UnauthorizedOperation
    }
  }
}
