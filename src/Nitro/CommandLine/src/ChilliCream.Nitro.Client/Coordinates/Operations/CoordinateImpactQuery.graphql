query coordinateImpactQuery(
  $apiId: ID!
  $coordinate: String!
  $from: DateTime!
  $to: DateTime!
  $operationsPerClient: Int! = 100
) {
  apiById(id: $apiId) {
    id
    name
    stages {
      name
      coordinate(coordinate: $coordinate) {
        coordinate
        isDeprecated
        usage(from: $from, to: $to) {
          totalRequests
          clientCount
          operationCount
          firstSeen
          lastSeen
          errorRate
          meanDuration
        }
        metrics {
          clientUsages(from: $from, to: $to) {
            name
            totalVersions
            totalOperations
            totalRequests
            client {
              id
              name
            }
            metrics {
              operations(first: $operationsPerClient) {
                nodes {
                  operationName
                  hash
                  kind
                  opm
                  totalCount
                  totalCountWithErrors
                  errorRate
                  averageLatency
                  impact
                  totalVersions
                }
              }
            }
          }
        }
      }
    }
  }
}
