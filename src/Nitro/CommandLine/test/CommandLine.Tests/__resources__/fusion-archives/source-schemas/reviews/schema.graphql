type Query {
  tag1Field: String @tag(name: "tag1")
  tag2Field: String @tag(name: "tag2")
  node(id: ID!): Node
  cachedField: String @cacheControl(maxAge: 60, scope: PUBLIC)
}

type Review implements Node {
  id: ID!
  body: String
}

interface Node {
  id: ID!
}

enum CacheControlScope {
  "The value to cache is not tied to a single user."
  PUBLIC
  "The value to cache is specific to a single user."
  PRIVATE
}

directive @tag(name: String!) on FIELD_DEFINITION

"The `@cacheControl` directive may be provided for individual fields or entire object, interface or union types to provide caching hints to the executor."
directive @cacheControl(
  "The maximum amount of time this field's cached value is valid, in seconds."
  maxAge: Int
  "The maximum amount of time this field's cached value is valid in shared caches like CDNs, in seconds."
  sharedMaxAge: Int
  "If `true`, the field inherits the `maxAge` of its parent field."
  inheritMaxAge: Boolean
  "If `PRIVATE`, the field's value is specific to a single user. The default value is `PUBLIC`, which means the field's value is not tied to a single user."
  scope: CacheControlScope
  "The Vary HTTP response header describes the parts of the request message aside from the method and URL that influenced the content of the response it occurs in. Most often, this is used to create a cache key when content negotiation is in use."
  vary: [String]
) on OBJECT | FIELD_DEFINITION | INTERFACE | UNION
