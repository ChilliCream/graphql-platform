query FusionStageCompositionSettings($apiId: ID!) {
  node(id: $apiId) {
    ... on Api {
      stages {
        name
        compositionSettings {
          cacheControlMergeBehavior
          enableGlobalObjectIdentification
          excludeByTag
          removeUnreferencedDefinitions
          tagMergeBehavior
        }
      }
    }
  }
}
