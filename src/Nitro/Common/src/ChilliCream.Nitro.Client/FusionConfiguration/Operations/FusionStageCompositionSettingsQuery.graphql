query FusionStageCompositionSettings($apiId: ID!, $stageName: String!) {
  node(id: $apiId) {
    ... on Api {
      stage(name: $stageName) {
        compositionSettings {
          cacheControlMergeBehavior
          enableGlobalObjectIdentification
          excludeByTag
          removeUnreferencedDefinitions
          tagMergeBehavior
        }
      }
    }
  }
}
